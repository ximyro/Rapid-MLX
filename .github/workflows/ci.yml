name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff lint
        run: ruff check vllm_mlx/ tests/

      - name: Run ruff format check
        run: ruff format --check vllm_mlx/ tests/

      # Structural check — catches "silent flag drop" bugs where a CLI
      # arg is defined but never plumbed to its target config (#400).
      # Pure stdlib + AST — no mlx import required, runs on Linux.
      - name: CLI ↔ Config fidelity audit
        run: python scripts/audit_cli_config_fidelity.py

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy pydantic fastapi

      - name: Run mypy
        run: mypy vllm_mlx/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pydantic fastapi jsonschema httpx psutil transformers requests

      - name: Run unit tests (no MLX required)
        # NOTE: tests in this list MUST not import mlx / mlx_lm at module
        # load time — Linux CI doesn't have MLX (it's Apple-Silicon only).
        # Tests that need mlx live in the test-apple-silicon job below.
        run: |
          pytest \
            tests/test_mcp_security.py \
            tests/test_structured_output.py \
            tests/test_reasoning_parser.py \
            tests/test_tool_parsers.py \
            tests/test_streaming_json_encoder.py \
            tests/test_native_tool_format.py \
            tests/test_prefix_cache.py \
            tests/test_mllm_cache.py \
            tests/test_api_models.py \
            tests/test_api_utils.py \
            tests/test_request.py \
            tests/test_anthropic_models.py \
            tests/test_anthropic_adapter.py \
            tests/test_harmony_parsers.py \
            tests/test_tool_calling.py \
            tests/test_tool_injection.py \
            tests/test_streaming_latency.py \
            tests/test_streaming_newlines.py \
            tests/test_minimax_reasoning_parser.py \
            tests/test_pr_validate_runner.py \
            tests/test_pr_validate_codex.py \
            -v --tb=short \
            -k "not Integration and not InjectJson and not TestMLXMultimodalLMCache" \
            --cov=vllm_mlx \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  test-apple-silicon:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[vision]"
          pip install pytest pytest-asyncio

      - name: Verify Apple Silicon
        run: |
          python -c "import platform; assert platform.machine() == 'arm64', 'Not ARM64'"
          python -c "import mlx.core as mx; print(f'MLX OK: {mx.default_device()}')"

      - name: Run MLX-dependent tests
        # SimpleEngine was removed in PR #156 — test_simple_engine.py,
        # test_llm.py, test_deltanet_snapshot.py went with it.
        # test_memory_cache exercises mlx-importing code paths so it
        # lives here, not in the Linux test-matrix job.
        run: |
          pytest \
            tests/test_platform.py \
            tests/test_mllm.py \
            tests/test_server.py \
            tests/test_paged_cache.py \
            tests/test_mllm_continuous_batching.py \
            tests/test_mllm_cache.py \
            tests/test_memory_cache.py \
            tests/test_optimizations.py \
            tests/test_batching.py \
            tests/test_continuous_batching.py \
            tests/test_streaming_simulator.py \
            tests/test_streaming_detokenizer.py \
            tests/test_tool_logits.py \
            -v --tb=short \
            -m "not slow" \
            -k "not Integration"

  tests:
    needs: [test-matrix, test-apple-silicon]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.test-apple-silicon.result }}" != "success" ]; then
            echo "Apple Silicon tests failed"
            exit 1
          fi
